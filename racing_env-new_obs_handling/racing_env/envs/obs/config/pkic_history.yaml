## --- Historical observations (past N steps of vehicle state + controls) ---
## Stored features per step (8-dim, newest first):
##   v_x, v_y, r, delta, delta_ref, omega_wheels, omega_wheels_ref, omega_wheels_ref_dot
## length=50, sample_rate=5  →  10 steps  →  dim = 10 * 8 = 80
- name: "obs_history"
  dim: 80            # n_steps * feature_dim  =  10 * 8
  length: 50         # consider the 50 most-recent entries in the ring buffer
  sample_rate: 5     # keep every 5th step  →  10 time-steps
  feature_dim: 8     # features stored per step in the history buffer
  min_val: -1
  max_val: 1
  std: 0.0

